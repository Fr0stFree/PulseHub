---
otel-collector:
  image:
    repository: otel/opentelemetry-collector-contrib
  mode: deployment
  ports:
    metrics:
      enabled: true
      containerPort: 8889
      servicePort: 8889
      protocol: TCP
  service:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8889"
      prometheus.io/path: "/metrics"
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch: {}
    exporters:
      otlp/tempo:
        endpoint: pulse-hub-observability-tempo:4317
        tls:
          insecure: true
      otlphttp/loki:
        endpoint: http://pulse-hub-observability-loki:3100/otlp
        tls:
          insecure: true
      prometheus:
        endpoint: 0.0.0.0:8889
      debug: {}
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp/tempo]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlphttp/loki]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus]
          
prometheus:
  alertmanager:
    enabled: false
  kube-state-metrics:
    enabled: false
  prometheus-node-exporter:
    enabled: false
  prometheus-pushgateway:
    enabled: false
  server:
    replicaCount: 1
    persistentVolume:
      enabled: false
    retention: "6h"
    resources:
      limits:
        memory: 512Mi
      requests:
        cpu: 200m
        memory: 256Mi
  scrapeConfigs:
    opentelemetry-collector:
      enabled: true
      job_name: "otel-collector"
      honor_labels: true
      static_configs:
        - targets:
            - "pulse-hub-observability-otel-collector:8889"
      metrics_path: "/metrics"
      scrape_interval: 30s
      scrape_timeout: 10s
    prometheus:
      enabled: true
    kubernetes-api-servers:
      enabled: false
    kubernetes-nodes:
      enabled: false
    kubernetes-nodes-cadvisor:
      enabled: false
    kubernetes-service-endpoints:
      enabled: false
    kubernetes-service-endpoints-slow:
      enabled: false
    prometheus-pushgateway:
      enabled: false
    kubernetes-services:
      enabled: false
    kubernetes-pods:
      enabled: false
    kubernetes-pods-slow:
      enabled: false

grafana:
  adminUser: admin
  adminPassword: admin
  persistence:
    enabled: false
  service:
    type: ClusterIP
    port: 80
    targetPort: 3000
  resources:
    limits:
      memory: 256Mi
    requests:
      memory: 128Mi
      cpu: 200m
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://pulse-hub-observability-prometheus-server
          isDefault: true
        - name: Loki
          type: loki
          access: proxy
          url: http://pulse-hub-observability-loki:3100
        - name: Tempo
          type: tempo
          access: proxy
          url: http://pulse-hub-observability-tempo:3200
          isDefault: false

loki:
  deploymentMode: SingleBinary
  singleBinary:
    replicas: 1
  write:
    replicas: 0
  read:
    replicas: 0
  backend:
    replicas: 0
  gateway:
    enabled: false
  test:
    enabled: false
  lokiCanary:
    enabled: false
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
  monitoring:
    dashboards:
      enabled: false
    rules:
      enabled: false
    serviceMonitor:
      enabled: false
    selfMonitoring:
      enabled: false
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
      bucketNames:
        chunks: chunks
        ruler: ruler
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    limits_config:
      allow_structured_metadata: true

tempo:
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      memory: 512Mi
  memBallastSizeMbs: 64
  reportingEnabled: false
  multitenancyEnabled: false
  metricsGenerator:
    enabled: false
  retention: 8h
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"
  tempoQuery:
    enabled: false
  serviceMonitor:
    enabled: false
  persistence:
    enabled: false
