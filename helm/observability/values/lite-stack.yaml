---
otel-collector:
  image:
    repository: otel/opentelemetry-collector-contrib
  mode: deployment
  ports:
    metrics:
      enabled: true
      containerPort: 8889
      servicePort: 8889
      protocol: TCP
  service:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8889"
      prometheus.io/path: "/metrics"
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch: {}
    exporters:
      prometheus:
        endpoint: 0.0.0.0:8889
      debug: {}
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus]
          
prometheus:
  alertmanager:
    enabled: false
  kube-state-metrics:
    enabled: false
  prometheus-node-exporter:
    enabled: false
  prometheus-pushgateway:
    enabled: false
  server:
    replicaCount: 1
    persistentVolume:
      enabled: false
    retention: "6h"
  scrapeConfigs:
    opentelemetry-collector:
      enabled: true
      job_name: "otel-collector"
      honor_labels: true
      static_configs:
        - targets:
            - "pulse-hub-observability-otel-collector:8889"
      metrics_path: "/metrics"
      scrape_interval: 30s
      scrape_timeout: 10s
    prometheus:
      enabled: true
    kubernetes-api-servers:
      enabled: false
    kubernetes-nodes:
      enabled: false
    kubernetes-nodes-cadvisor:
      enabled: false
    kubernetes-service-endpoints:
      enabled: false
    kubernetes-service-endpoints-slow:
      enabled: false
    prometheus-pushgateway:
      enabled: false
    kubernetes-services:
      enabled: false
    kubernetes-pods:
      enabled: false
    kubernetes-pods-slow:
      enabled: false

grafana:
  adminUser: admin
  adminPassword: admin
  persistence:
    enabled: false
  service:
    type: ClusterIP
    port: 80
    targetPort: 3000
  resources:
    limits:
      memory: 256Mi
    requests:
      memory: 128Mi
      cpu: 100m
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://pulse-hub-observability-prometheus-server
          isDefault: true
