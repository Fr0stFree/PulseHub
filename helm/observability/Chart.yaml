---
apiVersion: v2
type: application
name: pulse-hub-observability
description: A Helm chart for deploying observability stack for pulse-hub application
version: 0.1.0
appVersion: "latest"
dependencies:
  - name: opentelemetry-collector
    alias: otel-collector
    version: 0.145.0
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts

  - name: prometheus
    version: "28.13.0"
    repository: https://prometheus-community.github.io/helm-charts

  - name: grafana
    version: "8.5.0"
    repository: https://grafana.github.io/helm-charts
  
  - name: loki
    version: "6.55.0"
    repository: https://grafana.github.io/helm-charts

  - name: tempo
    version: "1.24.4"
    repository: https://grafana.github.io/helm-charts

