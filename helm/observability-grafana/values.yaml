loki:
  deploymentMode: SingleBinary
  singleBinary:
    replicas: 1
    persistence:
      enabled: true
    extraVolumes:
      - name: loki-var
        emptyDir: {}

    extraVolumeMounts:
      - name: loki-var
        mountPath: /var/loki

  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0
  gateway:
    enabled: false
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
  lokiCanary:
    enabled: false
  test:
    enabled: false
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    containerSecurityContext:
      readOnlyRootFilesystem: false
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    storage:
      type: filesystem
      bucketNames:
        chunks: chunks
        ruler: ruler
        admin: admin
